name: Offline Delivery CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  offline-checks:
    name: Offline regression checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      DEEPSEEK_API_KEY: ""
      LOCAL_LLM_PROVIDER: mock_local
      LOCAL_LLM_API_KEY: ""
      AMAP_API_KEY: ""
      BAIDU_MAP_AK: ""
      OPENCHARGEMAP_API_KEY: ""
      USE_OPEN_METEO: "0"
      USE_OPENCHARGEMAP: "0"
      ENABLE_LANGGRAPH: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r requirements-optional.txt

      - name: Run offline delivery check
        run: python scripts/run_delivery_check.py --unit-timeout 300

      - name: Upload delivery report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: delivery-check-report
          path: reports/delivery_check_report.md
          if-no-files-found: ignore
